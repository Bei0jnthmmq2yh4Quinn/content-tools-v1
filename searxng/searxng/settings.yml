use_default_settings: true

server:
  secret_key: "${SEARXNG_SECRET_KEY}"
  limiter: false
  public_instance: false

redis:
  url: redis://redis:6379/0

ui:
  static_use_hash: true

search:
  safe_search: 1
  autocomplete: ""
  formats:
    - html
    - json

outgoing:
  request_timeout: 6.0

engines:
  - name: duckduckgo
    disabled: false
  - name: bing
    disabled: false
  - name: google
    disabled: true
